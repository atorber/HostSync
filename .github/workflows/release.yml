name: Release & Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build web-ui
        run: npm -w web-ui run build

      - name: Build cli
        run: npm -w cli run build

      - name: Bundle web-ui dist into cli package
        run: |
          rm -rf cli/web-dist
          cp -r web-ui/dist cli/web-dist

      - name: Sync version from release tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          # 去掉可能的 v 前缀：v0.2.0 -> 0.2.0
          VERSION="${TAG#v}"
          echo "Publishing version: ${VERSION}"
          cd cli
          npm version "${VERSION}" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: npm -w cli publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
